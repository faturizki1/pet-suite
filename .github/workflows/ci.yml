name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: pet_suite_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready -U test -d pet_suite_test
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check
        env:
          DATABASE_URL: postgres://test:test@localhost:5433/pet_suite_test
          JWT_SECRET: ci-secret-key-min-32-chars-long-for-testing

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgres://test:test@localhost:5433/pet_suite_test
          JWT_SECRET: ci-secret-key-min-32-chars-long-for-testing